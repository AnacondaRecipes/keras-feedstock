{% set name = "keras" %}
{% set version = "3.13.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ name }}-team/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5e8456cac2eed0ae1ab50cde07e8f4d1a294ccb49860319c946265510659fd08

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-build-isolation -v
  skip: true  # [py<311]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
  run:
    - python
    - absl-py
    - numpy
    - rich
    - namex
    - h5py
    - optree
    - ml_dtypes
    - packaging
  run_constrained:
    # https://github.com/keras-team/keras/blob/v3.13.1/requirements.txt
    - tensorflow-base >=2.20.0
    # leaving as lower bounds for now as compatibility is not well documented, with conflicting bounds in requirements files.
    - pytorch >=2.6.0
    # 0.7.2 is the latest available version that is compatible with other dependencies
    - jax >=0.7.2
    - flax >=0.12.1
    # https://github.com/keras-team/keras/blob/v3.13.1/requirements-common.txt
    - onnxscript !=0.3.2
    # https://github.com/keras-team/keras/blob/v3.13.1/requirements.txt#L7C3-L7C55
    - ai-edge-litert ==1.3.0

test:
  source_files:
    - pyproject.toml
    - integration_tests
  import:
    - keras
    - keras.api
    - keras.src
  requires:
    - pip
    - jax
    - tensorflow
    - pytorch
    - pytest
  commands:
    - pip check

about:
  home: https://github.com/keras-team/keras
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Deep Learning for humans
  description: |
    Keras 3 is a multi-backend deep learning framework, with support for JAX,
    TensorFlow, and PyTorch. Effortlessly build and train models for computer
    vision, natural language processing, audio processing, timeseries forecasting,
    recommender systems, etc.
  doc_url: https://keras.io
  dev_url: https://github.com/keras-team/keras

extra:
  recipe-maintainers:
    - ericdill
    - mariusvniekerk
    - croth1
    - ocefpaf
    - jjhelmus